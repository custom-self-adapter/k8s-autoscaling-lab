repositories:
  - name: ingress-nginx
    url: https://kubernetes.github.io/ingress-nginx
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: twuni
    url: https://twuni.github.io/docker-registry.helm

releases:
  - name: registry
    namespace: registry
    chart: twuni/docker-registry
    version: 3.0.0
    values:
      - values/registry.yaml

  - name: kube-prometheus-stack
    namespace: monitoring
    chart: prometheus-community/kube-prometheus-stack
    version: 82.10.1
    values:
      - values/prometheus.yaml

  - name: prometheus-adapter
    namespace: monitoring
    chart: prometheus-community/prometheus-adapter
    version: 5.3.0
    needs: ["kube-prometheus-stack"]
    values:
      - values/prometheus-adapter.yaml

  - name: ingress-nginx
    namespace: ingress-nginx
    chart: ingress-nginx/ingress-nginx
    version: 4.14.3
    needs: ["monitoring/kube-prometheus-stack"]
    values:
      - values/ingress.yaml

  - name: csa-operator
    namespace: csa
    chart: charts/custom-self-adapter-operator
    values:
      - values/csa-operator.yaml
